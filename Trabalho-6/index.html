<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Meu Pet Virtual</title>

        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    </head>

    <body class="min-h-screen flex flex-col transition-all duration-1000"
style="
background-image: url('mundo.png');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
">

<div class="w-full flex items-center justify-start p-4 gap-4">

    <div class="avatar">
      <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
        <img src="round.png" />
      </div>
    </div>

    <input 
      type="text" 
      placeholder="Zé" 
      class="input input-secondary"
    />

  </div>

<div class="flex flex-col items-center w-full px-4">

    <img 
      id="normal"
      src="normal.png"
      alt="Criatura"
      class="w-full max-w-md h-auto drop-shadow-2xl"
    />

    <div class="mt-4">

        <img 
          id="btnImage"
          src="btn.png"
          alt="Comida"
          class="w-32 h-auto active:scale-95 transition cursor-pointer"
          onclick="alimentar()"
        />

    </div>

</div>

<!-- Easter egg para vc professor -->
<div class="card bg-base-100 w-96 shadow-sm hidden">
  <figure class="px-10 pt-10">
    <img
      src="ferlini.jpeg"
      alt="Gostosinho"
      class="rounded-xl" />
  </figure>
  <div class="card-body items-center text-center">
    <h2 class="card-title">Gostosinho</h2>
    <p>O Gostosinho sempre vai ser o pato do Professor Dacio</p>
    <div class="card-actions">
      <button class="btn btn-primary">Dar Risada 😂</button>
    </div>
  </div>
</div>

        <script src="script.js"></script>

    </body>

   

     
</html>
