<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Escolar</title>
<style>
    body { 
        margin: 0;
        display: flex;
        justify-content: center; 
        align-items: center;     
        height: 100vh;
        background-color: #f5f6fa;
        font-family: sans-serif;
    }

    .card { 
        background-color: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        width: 320px;
    }

    h3 { text-align: center; color: #2f3640; margin-top: 0; }

    input { 
        padding: 10px; 
        width: 100%; 
        box-sizing: border-box;
        border: 1px solid #dcdde1;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    button { 
        padding: 12px;
        cursor: pointer;
        background-color: #2f3640;
        color: white;
        border: none;
        border-radius: 8px;
        width: 100%;
        font-weight: bold;
    }

    #feedback {
        margin-top: 15px;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        display: none;
        font-weight: bold;
    }

    .aprovado { background-color: #d1d8ff; color: #0000ff; display: block !important; }
    .exame { background-color: #d1ffd1; color: #008000; display: block !important; }
    .reprovado { background-color: #ffd1d1; color: #ff0000; display: block !important; }
</style>
</head>
<body>

    <div class="card">
        <h3>Média Acadêmica</h3>
        <input type="text" id="nome" placeholder="Nome do Aluno">
        <input type="number" id="n1" step="0.1" placeholder="Nota 1">
        <input type="number" id="n2" step="0.1" placeholder="Nota 2">
        <input type="number" id="n3" step="0.1" placeholder="Nota 3">
        <button id="btnCalcular">Calcular Média</button>
        <div id="feedback"></div>
    </div>

<script>
    document.getElementById('btnCalcular').addEventListener('click', () => {
        const nome = document.getElementById('nome').value;
        const n1 = Number(document.getElementById('n1').value);
        const n2 = Number(document.getElementById('n2').value);
        const n3 = Number(document.getElementById('n3').value);
        const feedback = document.getElementById('feedback');

        const media = (n1 + n2 + n3) / 3;
        const mediaFormatada = media.toFixed(2);
        
        let situacao = "";
        let classe = "";

        if (media >= 7) {
            situacao = `Parabéns ${nome}! Aprovado com média ${mediaFormatada}`;
            classe = "aprovado";
        } else if (media >= 4) {
            const quantoFalta = (10 - media).toFixed(2);
            situacao = `${nome}, você está em Exame (Média ${mediaFormatada}). Precisa de ${quantoFalta} para 10.0`;
            classe = "exame";
        } else {
            situacao = `${nome}, você foi Reprovado com média ${mediaFormatada}`;
            classe = "reprovado";
        }

        feedback.innerText = situacao;
        feedback.className = classe;
    });
</script>
        
</body>
</html>
