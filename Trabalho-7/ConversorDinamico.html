<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Dinâmico de Temperatura</title>
<style>
    body { 
        margin: 0;
        display: flex;
        justify-content: center; 
        align-items: center;     
        height: 100vh;
        background-color: #f0f4f8;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card { 
        background-color: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 350px;
        text-align: center;
    }

    h3 { margin-bottom: 25px; color: #2c3e50; }

    .campo {
        margin-bottom: 20px;
        text-align: left;
    }

    label { display: block; margin-bottom: 5px; color: #7f8c8d; font-weight: bold; }

    input { 
        padding: 12px; 
        width: 100%; 
        box-sizing: border-box;
        border: 2px solid #dfe6e9;
        border-radius: 10px;
        font-size: 18px;
        outline: none;
        transition: border-color 0.3s;
    }

    input:focus { border-color: #3498db; }
</style>
</head>
<body>

    <div class="card">
        <h3>Conversor de Temperatura</h3>
        
        <div class="campo">
            <label>Celsius (°C)</label>
            <input type="number" id="celsius" step="0.1" placeholder="0">
        </div>

        <div class="campo">
            <label>Fahrenheit (°F)</label>
            <input type="number" id="fahrenheit" step="0.1" placeholder="32">
        </div>
    </div>

<script>
    const campoC = document.getElementById('celsius');
    const campoF = document.getElementById('fahrenheit');

    campoC.addEventListener('input', () => {
        if (campoC.value === "") {
            campoF.value = "";
            return;
        }
        const resultado = (parseFloat(campoC.value) * 9/5) + 32;
        campoF.value = resultado.toFixed(2);
    });

    campoF.addEventListener('input', () => {
        if (campoF.value === "") {
            campoC.value = "";
            return;
        }
        const resultado = (parseFloat(campoF.value) - 32) * 5/9;
        campoC.value = resultado.toFixed(2);
    });
</script>
        
</body>
</html>
