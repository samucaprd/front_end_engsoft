<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank - Orçamento VIP v3</title>
    <style>
        :root {
            --bg-body: #0b0e14;
            --bg-card: #161b22;
            --accent: #00d4ff;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --border: #30363d;
            --discount-color: #f85149;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--bg-card);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.4rem; color: var(--accent); text-align: center; margin-bottom: 2rem; }

        .field { margin-bottom: 1.5rem; }

        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }

        select, input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        select:focus, input:focus { border-color: var(--accent); }

        #containerDesconto {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: var(--transition);
        }

        #containerDesconto.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #30363d;
            transition: .4s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-calc {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-calc:hover { filter: brightness(1.1); transform: scale(1.01); }

        .results {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }

        .total-row {
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .discount-text { color: var(--discount-color); font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h1>Infinity Events</h1>

        <div class="field">
            <label>Escolha o Pacote</label>
            <select id="pacote" onchange="atualizarInterface()">
                <option value="50">Standard (R$ 50,00)</option>
                <option value="80">Premium (R$ 80,00)</option>
                <option value="120">Infinity Deluxe (R$ 120,00)</option>
            </select>
        </div>

        <div class="field">
            <label>Nº de Convidados</label>
            <input type="number" id="qtd" placeholder="Ex: 50">
        </div>

        <div id="containerDesconto">
            <span id="labelDesconto" style="font-size: 0.85rem;">Aplicar desconto?</span>
            <label class="switch">
                <input type="checkbox" id="descontoToggle">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-calc" onclick="processarOrcamento()">Calcular Orçamento</button>

        <div id="resArea" class="results">
            <div class="row">
                <span>Custo Base:</span>
                <span id="outBruto">R$ 0,00</span>
            </div>
            <div class="row">
                <span>Taxa de Serviço (10%):</span>
                <span id="outTaxa">R$ 0,00</span>
            </div>
            <div id="rowDesconto" class="row discount-text">
                <span id="labelPercent">Desconto (0%):</span>
                <span id="outDesc">R$ 0,00</span>
            </div>
            <div class="row total-row">
                <span>Total Final:</span>
                <span id="outTotal">R$ 0,00</span>
            </div>
        </div>
    </div>

    <script>
        
        function atualizarInterface() {
            const pacote = document.getElementById('pacote').value;
            const container = document.getElementById('containerDesconto');
            const toggle = document.getElementById('descontoToggle');
            const label = document.getElementById('labelDesconto');

            if (pacote === "80") { // Premium
                container.classList.add('visible');
                label.innerText = "Aplicar Desconto Premium (5%)?";
            } else if (pacote === "120") { // Deluxe
                container.classList.add('visible');
                label.innerText = "Aplicar Desconto Deluxe (10%)?";
            } else {
                container.classList.remove('visible');
                toggle.checked = false; // Reseta o toggle se voltar para Standard
            }
            
            document.getElementById('resArea').style.display = 'none';
        }

        function processarOrcamento() {
            const select = document.getElementById('pacote');
            const valorUnitario = parseFloat(select.value);
            const qtd = parseInt(document.getElementById('qtd').value);
            const aplicarDesconto = document.getElementById('descontoToggle').checked;

            if (isNaN(qtd) || qtd <= 0) {
                alert("Por favor, informe uma quantidade válida de convidados.");
                return;
            }

            const base = valorUnitario * qtd;
            const taxa = base * 0.10;
            const subtotal = base + taxa;

            let percentual = 0;
            let labelPercent = "0%";

            if (aplicarDesconto) {
                if (valorUnitario === 80) {
                    percentual = 0.05;
                    labelPercent = "5%";
                } else if (valorUnitario === 120) {
                    percentual = 0.10;
                    labelPercent = "10%";
                }
            }

            const descontoFinal = subtotal * percentual;
            const total = subtotal - descontoFinal;

            document.getElementById('outBruto').innerText = formatar(base);
            document.getElementById('outTaxa').innerText = formatar(taxa);
            document.getElementById('labelPercent').innerText = `Desconto Aplicado (${labelPercent}):`;
            document.getElementById('outDesc').innerText = `- ${formatar(descontoFinal)}`;
            document.getElementById('outTotal').innerText = formatar(total);

            // Mostrar ou ocultar a linha de desconto no recibo
            document.getElementById('rowDesconto').style.display = (percentual > 0) ? 'flex' : 'none';
            
            document.getElementById('resArea').style.display = 'block';
        }

        function formatar(v) {
            return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }
    </script>
</body>
</html>
